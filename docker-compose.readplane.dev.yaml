# Development overlay for the Go read plane. Included by Makefile dev targets.
# Usage:
#   docker compose -f docker-compose.dev.yaml -f docker-compose.readplane.dev.yaml up -d --build readplane
#   docker compose -f docker-compose.dev.yaml -f docker-compose.readplane.dev.yaml --profile readplane-proxy up -d --build readplane-proxy

services:
  readplane:
    image: crate-readplane:local
    build:
      context: ./app/readplane
    container_name: crate-dev-readplane
    environment:
      READPLANE_ADDR: :8686
      DATABASE_URL: postgresql://crate:crate@postgres:5432/crate?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      JWT_SECRET: dev-secret-not-for-production
      READPLANE_ENABLED: "true"
      READPLANE_ENABLE_SSE: "true"
      READPLANE_ROUTE_MODE: shadow
      READPLANE_FALLBACK_ENABLED: "true"
      API_FALLBACK_BASE: http://api:8585
      READPLANE_MAX_DB_CONNS: "4"
      READPLANE_MIN_DB_CONNS: "1"
      READPLANE_QUERY_TIMEOUT_MS: "800"
      READPLANE_SNAPSHOT_MAX_AGE_SECONDS: "600"
      READPLANE_STALE_MAX_AGE_SECONDS: "3600"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,api,readplane,postgres,redis"
      no_proxy: "localhost,127.0.0.1,::1,api,readplane,postgres,redis"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "8686:8686"
    networks:
      - crate-dev

  caddy:
    volumes:
      - ./data/caddy/Caddyfile.readplane.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_started
      readplane:
        condition: service_started

  readplane-proxy:
    image: caddy:2-alpine
    container_name: crate-dev-readplane-proxy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      NO_PROXY: "localhost,127.0.0.1,::1,api,readplane,postgres,redis,host.docker.internal"
      no_proxy: "localhost,127.0.0.1,::1,api,readplane,postgres,redis,host.docker.internal"
    profiles:
      - readplane-proxy
    ports:
      - "18080:80"
      - "18443:443"
    volumes:
      - ./data/caddy/Caddyfile.readplane.dev:/etc/caddy/Caddyfile:ro
      - dev_readplane_caddy_data:/data
      - dev_readplane_caddy_config:/config
    networks:
      - crate-dev
    depends_on:
      api:
        condition: service_started
      readplane:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dev_readplane_caddy_data:
  dev_readplane_caddy_config:
