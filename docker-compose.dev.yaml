# Local development stack
# Usage: docker compose -f docker-compose.dev.yaml up -d
# UI: http://localhost:8580
# API: http://localhost:8585

networks:
  crate-dev:

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: crate-dev-postgres
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - log_line_prefix=%m [%p] %q%u@%d
    environment:
      - POSTGRES_USER=crate
      - POSTGRES_PASSWORD=crate
      - POSTGRES_DB=crate
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - crate-dev

  redis:
    image: redis:7-alpine
    container_name: crate-dev-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD:-redis-dev}
    ports:
      - "6380:6379"
    networks:
      - crate-dev

  slskd:
    image: slskd/slskd:latest
    container_name: crate-dev-slskd
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_NO_AUTH=true
      # Never inherit the main/prod Soulseek account in local dev.
      # Use dedicated dev credentials only if you explicitly need local search.
      - SLSKD_SLSK_USERNAME=${DEV_SLSKD_SLSK_USERNAME:-}
      - SLSKD_SLSK_PASSWORD=${DEV_SLSKD_SLSK_PASSWORD:-}
      - SLSKD_SHARED_DIR=/music
      - SLSKD_DOWNLOADS_DIR=/downloads/complete
      - SLSKD_INCOMPLETE_DIR=/downloads/incomplete
    volumes:
      - ./test-music:/music:ro
      - dev_slskd:/app
      - ./data/slskd/downloads/complete:/downloads/complete
      - ./data/slskd/downloads/incomplete:/downloads/incomplete
    ports:
      - "5030:5030"
    networks:
      - crate-dev

  api:
    build:
      context: ./app
      target: api
    container_name: crate-dev-api
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - POSTGRES_SUPERUSER_USER=crate
      - POSTGRES_SUPERUSER_PASSWORD=crate
      - POSTGRES_SUPERUSER_DB=crate
      - CRATE_RUNTIME=api
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - CRATE_SSE_REDIS_MAX_CONNECTIONS=${CRATE_SSE_REDIS_MAX_CONNECTIONS:-128}
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - OLLAMA_URL=http://ollama:11434
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini/gemini-2.5-flash}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CRATE_MEDIA_WORKER_URL=http://media-worker:8687
      - CRATE_MEDIA_WORKER_MAX_ACTIVE=${CRATE_MEDIA_WORKER_MAX_ACTIVE:-1}
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/tests:/app/tests:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music:ro
      - dev_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8585:8585"
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
      - slskd
      - media-worker
    mem_limit: 768m
    mem_reservation: 256m
    cpus: "1.0"
    command: ["api"]

  worker:
    build:
      context: ./app
      target: worker
    container_name: crate-dev-worker
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - POSTGRES_SUPERUSER_USER=crate
      - POSTGRES_SUPERUSER_PASSWORD=crate
      - POSTGRES_SUPERUSER_DB=crate
      - CRATE_RUNTIME=worker
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - OMP_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - MKL_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - TORCH_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - NUMBA_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - CRATE_FFMPEG_THREADS=${CRATE_WORKER_FFMPEG_THREADS:-1}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      # SCRAPE_PROXY_URL not set in dev — VPN image is x86_64 only, scrapes go direct
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/tests:/app/tests:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music
      - ./data/slskd/downloads/complete:/downloads/soulseek
      - dev_data:/data
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
      - slskd
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: "0.75"
    command:
      [
        "worker",
        "--queues",
        "fast,default",
        "--processes",
        "${CRATE_WORKER_PROCESSES:-1}",
        "--no-daemons",
        "--no-projector",
      ]

  projector:
    build:
      context: ./app
      target: worker
    container_name: crate-dev-projector
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - POSTGRES_SUPERUSER_USER=crate
      - POSTGRES_SUPERUSER_PASSWORD=crate
      - POSTGRES_SUPERUSER_DB=crate
      - CRATE_RUNTIME=projector
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - CRATE_PROJECTOR_INTERVAL_SECONDS=${CRATE_PROJECTOR_INTERVAL_SECONDS:-5}
      - CRATE_PROJECTOR_BATCH_LIMIT=${CRATE_PROJECTOR_BATCH_LIMIT:-200}
      - CRATE_LEGACY_POOL_MAXCONN=${PROJECTOR_LEGACY_POOL_MAXCONN:-2}
      - CRATE_SQLALCHEMY_POOL_SIZE=${PROJECTOR_SQLALCHEMY_POOL_SIZE:-1}
      - CRATE_SQLALCHEMY_MAX_OVERFLOW=${PROJECTOR_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music:ro
      - dev_data:/data
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
    mem_limit: 512m
    mem_reservation: 128m
    cpus: "0.25"
    command: ["projector"]

  maintenance-worker:
    build:
      context: ./app
      target: worker
    container_name: crate-dev-maintenance-worker
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - POSTGRES_SUPERUSER_USER=crate
      - POSTGRES_SUPERUSER_PASSWORD=crate
      - POSTGRES_SUPERUSER_DB=crate
      - CRATE_RUNTIME=worker
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - LASTFM_APIKEY=${LASTFM_APIKEY:-}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY:-}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - OMP_NUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - MKL_NUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - TORCH_NUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - NUMBA_NUM_THREADS=${MAINTENANCE_NATIVE_THREADS:-1}
      - CRATE_FFMPEG_THREADS=${MAINTENANCE_FFMPEG_THREADS:-1}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - SLSKD_URL=${SLSKD_URL:-http://slskd:5030}
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/tests:/app/tests:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music
      - ./data/slskd/downloads/complete:/downloads/soulseek
      - dev_data:/data
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
      - slskd
    mem_limit: 1g
    mem_reservation: 384m
    cpus: "0.5"
    command:
      [
        "worker",
        "--queues",
        "maintenance",
        "--processes",
        "${MAINTENANCE_WORKER_PROCESSES:-1}",
        "--no-service-loop",
        "--no-daemons",
        "--no-projector",
        "--no-telegram",
      ]

  analysis-worker:
    build:
      context: ./app
      target: worker
    container_name: crate-dev-analysis-worker
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - POSTGRES_SUPERUSER_USER=crate
      - POSTGRES_SUPERUSER_PASSWORD=crate
      - POSTGRES_SUPERUSER_DB=crate
      - CRATE_RUNTIME=worker
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - OMP_NUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - MKL_NUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - TORCH_NUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - NUMBA_NUM_THREADS=${ANALYSIS_NATIVE_THREADS:-1}
      - CRATE_FFMPEG_THREADS=${ANALYSIS_FFMPEG_THREADS:-1}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/tests:/app/tests:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music
      - dev_data:/data
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
    mem_limit: 2g
    mem_reservation: 768m
    cpus: "0.75"
    command:
      [
        "worker",
        "--queues",
        "heavy",
        "--processes",
        "${ANALYSIS_WORKER_PROCESSES:-1}",
        "--no-service-loop",
        "--no-projector",
        "--no-telegram",
      ]

  playback-worker:
    build:
      context: ./app
      target: worker
    container_name: crate-dev-playback-worker
    environment:
      - TZ=Europe/Madrid
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - CRATE_POSTGRES_USER=crate
      - CRATE_POSTGRES_PASSWORD=crate
      - CRATE_POSTGRES_DB=crate
      - CRATE_POSTGRES_HOST=postgres
      - POSTGRES_SUPERUSER_USER=crate
      - POSTGRES_SUPERUSER_PASSWORD=crate
      - POSTGRES_SUPERUSER_DB=crate
      - CRATE_RUNTIME=worker
      - DOMAIN=${DEV_DOMAIN:-dev.lespedants.org}
      - JWT_SECRET=dev-secret-not-for-production
      - DEFAULT_ADMIN_PASSWORD=admin
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - OMP_NUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - MKL_NUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - TORCH_NUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - NUMBA_NUM_THREADS=${PLAYBACK_NATIVE_THREADS:-1}
      - CRATE_FFMPEG_THREADS=${PLAYBACK_FFMPEG_THREADS:-1}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - CRATE_STREAM_TRANSCODE_MAX_CONCURRENT=${STREAM_TRANSCODE_MAX_CONCURRENT:-1}
    volumes:
      - ./app/crate:/app/crate:ro
      - ./app/tests:/app/tests:ro
      - ./app/config.yaml:/app/config.yaml:ro
      - ./test-music:/music:ro
      - dev_data:/data
    networks:
      - crate-dev
    depends_on:
      - postgres
      - redis
    mem_limit: 1g
    mem_reservation: 384m
    cpus: "1.0"
    command:
      [
        "worker",
        "--queues",
        "playback",
        "--processes",
        "${PLAYBACK_WORKER_PROCESSES:-1}",
        "--no-service-loop",
        "--no-daemons",
        "--no-projector",
        "--no-telegram",
      ]

  media-worker:
    build:
      context: ./app
      target: media-worker
    container_name: crate-dev-media-worker
    environment:
      - TZ=Europe/Madrid
      - DATA_DIR=/data
      - CRATE_MEDIA_WORKER_ADDR=0.0.0.0:8687
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis-dev}@redis:6379/0
    volumes:
      - ./test-music:/music:ro
      - dev_data:/data
    ports:
      - "8687:8687"
    networks:
      - crate-dev
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.25"

  caddy:
    image: caddy:2-alpine
    container_name: crate-dev-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - dev_caddy_data:/data
      - dev_caddy_config:/config
    networks:
      - crate-dev
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama:latest
    container_name: crate-dev-ollama
    volumes:
      - dev_ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - crate-dev

volumes:
  dev_postgres:
  dev_data:
  dev_slskd:
  dev_caddy_data:
  dev_caddy_config:
  dev_ollama:
