# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^app/crate/.*\.py$
      - id: ruff-format
        files: ^app/crate/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]
        exclude: ^(package-lock\.json|\.vite/|node_modules/|\.venv/|app/.*/node_modules/)

  - repo: local
    hooks:
      - id: eslint-listen
        name: eslint (listen app)
        entry: ./scripts/eslint-fix.sh app/listen
        language: system
        files: ^app/listen/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true

      - id: eslint-ui
        name: eslint (ui app)
        entry: ./scripts/eslint-fix.sh app/ui
        language: system
        files: ^app/ui/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true
