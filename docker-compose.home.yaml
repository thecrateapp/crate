name: crate

networks:
  crate:
    name: crate

x-crate-env: &crate-env
  TZ: ${TZ:-UTC}
  CRATE_CONFIG: /app/config.yaml
  DATA_DIR: /data
  DOMAIN: ${DOMAIN:-localhost}
  CRATE_POSTGRES_USER: ${CRATE_POSTGRES_USER:-crate}
  CRATE_POSTGRES_PASSWORD: ${CRATE_POSTGRES_PASSWORD:-crate}
  CRATE_POSTGRES_DB: ${CRATE_POSTGRES_DB:-crate}
  CRATE_POSTGRES_HOST: crate-postgres
  POSTGRES_SUPERUSER_USER: ${POSTGRES_SUPERUSER_USER:-crate}
  POSTGRES_SUPERUSER_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-crate}
  POSTGRES_SUPERUSER_DB: ${POSTGRES_SUPERUSER_DB:-crate}
  JWT_SECRET: ${JWT_SECRET:-change-me}
  DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
  REDIS_URL: redis://:${REDIS_PASSWORD}@crate-redis:6379/0
  CRATE_METRICS_REDIS_TTL_SECONDS: ${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
  APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
  APPLE_KEY_ID: ${APPLE_KEY_ID:-}
  APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
  OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama/llama3.1:8b}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}

x-crate-enrichment-env: &crate-enrichment-env
  LASTFM_APIKEY: ${LASTFM_APIKEY:-}
  LASTFM_API_SECRET: ${LASTFM_API_SECRET:-}
  FANART_API_KEY: ${FANART_API_KEY:-}
  SPOTIFY_ID: ${SPOTIFY_ID:-}
  SPOTIFY_SECRET: ${SPOTIFY_SECRET:-}
  SETLISTFM_API_KEY: ${SETLISTFM_API_KEY:-}
  DISCOGS_CONSUMER_KEY: ${DISCOGS_CONSUMER_KEY:-}
  DISCOGS_CONSUMER_SECRET: ${DISCOGS_CONSUMER_SECRET:-}
  TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY:-}
  SLSKD_URL: ${SLSKD_URL:-}
  SLSKD_API_KEY: ${SLSKD_API_KEY:-}

x-worker-resource-env: &worker-resource-env
  CRATE_RESOURCE_GOVERNOR_ENABLED: ${CRATE_RESOURCE_GOVERNOR_ENABLED:-true}
  CRATE_RESOURCE_MAX_LOAD_RATIO: ${CRATE_RESOURCE_MAX_LOAD_RATIO:-0.85}
  CRATE_RESOURCE_MAX_IOWAIT_PERCENT: ${CRATE_RESOURCE_MAX_IOWAIT_PERCENT:-25}
  CRATE_RESOURCE_MAX_SWAP_PERCENT: ${CRATE_RESOURCE_MAX_SWAP_PERCENT:-30}
  CRATE_RESOURCE_MIN_SWAP_USED_MB: ${CRATE_RESOURCE_MIN_SWAP_USED_MB:-512}
  CRATE_RESOURCE_MIN_MEMORY_AVAILABLE_PERCENT: ${CRATE_RESOURCE_MIN_MEMORY_AVAILABLE_PERCENT:-15}
  CRATE_RESOURCE_MAX_ACTIVE_USERS: ${CRATE_RESOURCE_MAX_ACTIVE_USERS:-0}
  CRATE_RESOURCE_MAX_ACTIVE_STREAMS: ${CRATE_RESOURCE_MAX_ACTIVE_STREAMS:-0}
  CRATE_RESOURCE_DEFER_SECONDS: ${CRATE_RESOURCE_DEFER_SECONDS:-300}
  CRATE_MAINTENANCE_WINDOW_ENABLED: ${CRATE_MAINTENANCE_WINDOW_ENABLED:-true}
  CRATE_MAINTENANCE_WINDOW_START: ${CRATE_MAINTENANCE_WINDOW_START:-02:00}
  CRATE_MAINTENANCE_WINDOW_END: ${CRATE_MAINTENANCE_WINDOW_END:-07:00}
  CRATE_MAINTENANCE_WINDOW_FINGERPRINT_LIMIT: ${CRATE_MAINTENANCE_WINDOW_FINGERPRINT_LIMIT:-1000}

x-worker-native-env: &worker-native-env
  NUMBA_CACHE_DIR: /tmp/numba_cache
  OMP_NUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  OPENBLAS_NUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  MKL_NUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  NUMEXPR_NUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  VECLIB_MAXIMUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  TORCH_NUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  NUMBA_NUM_THREADS: ${CRATE_WORKER_NATIVE_THREADS:-1}
  CRATE_FFMPEG_THREADS: ${CRATE_WORKER_FFMPEG_THREADS:-1}

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    environment:
      TZ: ${TZ:-UTC}
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:-}
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_DIR}/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${DATA_DIR}/traefik/acme.json:/acme.json
      - ${DATA_DIR}/traefik/conf:/conf
      - ${DATA_DIR}/traefik/logs:/var/log/traefik
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.services.traefik.loadbalancer.server.port: 80
      traefik.http.routers.traefik-secure.rule: Host(`traefik.${DOMAIN:-localhost}`)
      traefik.http.routers.traefik-secure.entryPoints: ${TRAEFIK_SECURE_ENTRYPOINT:-websecure}
      traefik.http.routers.traefik-secure.tls: ${TRAEFIK_TLS_ENABLED:-true}
      traefik.http.routers.traefik-secure.tls.certresolver: ${TRAEFIK_CERT_RESOLVER-}
      traefik.http.routers.traefik-secure.service: api@internal

  crate-redis:
    image: redis:7-alpine
    container_name: crate-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ${DATA_DIR}/redis:/data
    networks:
      - crate

  crate-postgres:
    image: pgvector/pgvector:pg15
    container_name: crate-postgres
    restart: unless-stopped
    mem_limit: 1g
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - log_line_prefix=%m [%p] %q%u@%d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER_USER:-crate}"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER_USER:-crate}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-crate}
      POSTGRES_DB: ${POSTGRES_SUPERUSER_DB:-crate}
    volumes:
      - ${DATA_DIR}/postgres:/var/lib/postgresql/data
    networks:
      - crate

  crate-media-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-media-worker:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-media-worker
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      TZ: ${TZ:-UTC}
      DATA_DIR: /data
      CRATE_MEDIA_WORKER_ADDR: 0.0.0.0:8687
      REDIS_URL: redis://:${REDIS_PASSWORD}@crate-redis:6379/0
    volumes:
      - ${MUSIC_DIR}:/music:ro
      - ${DATA_DIR}/crate:/data
    depends_on:
      crate-redis:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.25"

  crate-api:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-api:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-api
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    group_add:
      - "${DOCKER_GID:-988}"
    environment:
      <<: [*crate-env, *crate-enrichment-env]
      CRATE_RUNTIME: api
      CRATE_SSE_REDIS_MAX_CONNECTIONS: ${CRATE_SSE_REDIS_MAX_CONNECTIONS:-128}
      CRATE_MEDIA_WORKER_URL: http://crate-media-worker:8687
      CRATE_MEDIA_WORKER_MAX_ACTIVE: ${CRATE_MEDIA_WORKER_MAX_ACTIVE:-1}
    volumes:
      - ${CRATE_CONFIG_FILE:-./app/config.yaml}:/app/config.yaml:ro
      - ${MUSIC_DIR}:/music:ro
      - ${DATA_DIR}/crate:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${CRATE_API_PORT:-8585}:8585"
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
      crate-media-worker:
        condition: service_started
    networks:
      - crate
    mem_limit: 768m
    mem_reservation: 256m
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8585/api/status', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.crate-api.rule: Host(`api.${DOMAIN:-localhost}`)
      traefik.http.routers.crate-api.entryPoints: ${TRAEFIK_SECURE_ENTRYPOINT:-websecure}
      traefik.http.routers.crate-api.middlewares: crate-api-compress@docker
      traefik.http.services.crate-api.loadbalancer.server.port: 8585
      traefik.http.routers.crate-api.tls: ${TRAEFIK_TLS_ENABLED:-true}
      traefik.http.routers.crate-api.tls.certresolver: ${TRAEFIK_CERT_RESOLVER-}
      traefik.http.middlewares.crate-api-compress.compress: true
      traefik.http.middlewares.crate-api-compress.compress.encodings: gzip,br
      traefik.http.middlewares.crate-api-compress.compress.minResponseBodyBytes: 1024
      traefik.http.middlewares.crate-api-compress.compress.excludedContentTypes: text/event-stream,audio/mpeg,audio/flac,audio/x-flac,audio/mp4,audio/aac,audio/ogg,video/mp4,application/octet-stream,application/zip,application/x-zip-compressed,image/jpeg,image/png,image/webp,image/avif
    command: ["api"]

  crate-readplane:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-readplane:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-readplane
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      READPLANE_ADDR: :8686
      CRATE_POSTGRES_USER: ${CRATE_POSTGRES_USER:-crate}
      CRATE_POSTGRES_PASSWORD: ${CRATE_POSTGRES_PASSWORD:-crate}
      CRATE_POSTGRES_DB: ${CRATE_POSTGRES_DB:-crate}
      CRATE_POSTGRES_HOST: crate-postgres
      CRATE_POSTGRES_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD}@crate-redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me}
      READPLANE_ENABLED: ${READPLANE_ENABLED:-true}
      READPLANE_ENABLE_SSE: ${READPLANE_ENABLE_SSE:-true}
      READPLANE_ROUTE_MODE: ${READPLANE_ROUTE_MODE:-shadow}
      READPLANE_FALLBACK_ENABLED: ${READPLANE_FALLBACK_ENABLED:-true}
      API_FALLBACK_BASE: http://crate-api:8585
      READPLANE_MAX_DB_CONNS: ${READPLANE_MAX_DB_CONNS:-8}
      READPLANE_MIN_DB_CONNS: ${READPLANE_MIN_DB_CONNS:-1}
      READPLANE_QUERY_TIMEOUT_MS: ${READPLANE_QUERY_TIMEOUT_MS:-800}
      READPLANE_SNAPSHOT_MAX_AGE_SECONDS: ${READPLANE_SNAPSHOT_MAX_AGE_SECONDS:-600}
      READPLANE_STALE_MAX_AGE_SECONDS: ${READPLANE_STALE_MAX_AGE_SECONDS:-3600}
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
      crate-api:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 128m
    mem_reservation: 32m
    cpus: "0.25"

  crate-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-worker:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-worker
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      <<:
        [
          *crate-env,
          *crate-enrichment-env,
          *worker-resource-env,
          *worker-native-env,
        ]
      CRATE_RUNTIME: worker
      CRATE_LEGACY_POOL_MAXCONN: ${CRATE_WORKER_LEGACY_POOL_MAXCONN:-4}
      CRATE_SQLALCHEMY_POOL_SIZE: ${CRATE_WORKER_SQLALCHEMY_POOL_SIZE:-2}
      CRATE_SQLALCHEMY_MAX_OVERFLOW: ${CRATE_WORKER_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ${CRATE_CONFIG_FILE:-./app/config.yaml}:/app/config.yaml:ro
      - ${MUSIC_DIR}:/music
      - ${DOWNLOADS_DIR}:/downloads/soulseek
      - ${DATA_DIR}/crate:/data
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: "0.75"
    command:
      [
        "worker",
        "--queues",
        "fast,default",
        "--processes",
        "${CRATE_WORKER_PROCESSES:-1}",
        "--no-daemons",
        "--no-projector",
      ]

  crate-projector:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-worker:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-projector
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      <<: *crate-env
      CRATE_RUNTIME: projector
      CRATE_PROJECTOR_INTERVAL_SECONDS: ${CRATE_PROJECTOR_INTERVAL_SECONDS:-5}
      CRATE_PROJECTOR_BATCH_LIMIT: ${CRATE_PROJECTOR_BATCH_LIMIT:-200}
      CRATE_LEGACY_POOL_MAXCONN: ${PROJECTOR_LEGACY_POOL_MAXCONN:-2}
      CRATE_SQLALCHEMY_POOL_SIZE: ${PROJECTOR_SQLALCHEMY_POOL_SIZE:-1}
      CRATE_SQLALCHEMY_MAX_OVERFLOW: ${PROJECTOR_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ${CRATE_CONFIG_FILE:-./app/config.yaml}:/app/config.yaml:ro
      - ${MUSIC_DIR}:/music:ro
      - ${DATA_DIR}/crate:/data
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 512m
    mem_reservation: 128m
    cpus: "0.25"
    command: ["projector"]

  crate-maintenance-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-worker:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-maintenance-worker
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      <<: [*crate-env, *worker-resource-env, *worker-native-env]
      CRATE_RUNTIME: worker
      CRATE_LEGACY_POOL_MAXCONN: ${MAINTENANCE_LEGACY_POOL_MAXCONN:-2}
      CRATE_SQLALCHEMY_POOL_SIZE: ${MAINTENANCE_SQLALCHEMY_POOL_SIZE:-1}
      CRATE_SQLALCHEMY_MAX_OVERFLOW: ${MAINTENANCE_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ${CRATE_CONFIG_FILE:-./app/config.yaml}:/app/config.yaml:ro
      - ${MUSIC_DIR}:/music
      - ${DATA_DIR}/crate:/data
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 1g
    mem_reservation: 384m
    cpus: "0.5"
    command:
      [
        "worker",
        "--queues",
        "maintenance",
        "--processes",
        "${MAINTENANCE_WORKER_PROCESSES:-1}",
        "--no-service-loop",
        "--no-daemons",
        "--no-projector",
        "--no-telegram",
      ]

  crate-analysis-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-analysis-worker:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-analysis-worker
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      <<: [*crate-env, *worker-resource-env, *worker-native-env]
      CRATE_RUNTIME: worker
      CRATE_LEGACY_POOL_MAXCONN: ${ANALYSIS_LEGACY_POOL_MAXCONN:-2}
      CRATE_SQLALCHEMY_POOL_SIZE: ${ANALYSIS_SQLALCHEMY_POOL_SIZE:-1}
      CRATE_SQLALCHEMY_MAX_OVERFLOW: ${ANALYSIS_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ${CRATE_CONFIG_FILE:-./app/config.yaml}:/app/config.yaml:ro
      - ${MUSIC_DIR}:/music:ro
      - ${DATA_DIR}/crate:/data
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 2g
    mem_reservation: 768m
    cpus: "0.75"
    command:
      [
        "worker",
        "--queues",
        "heavy",
        "--processes",
        "${ANALYSIS_WORKER_PROCESSES:-1}",
        "--no-service-loop",
        "--no-projector",
        "--no-telegram",
      ]

  crate-playback-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-playback-worker:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-playback-worker
    restart: unless-stopped
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      <<: [*crate-env, *worker-native-env]
      CRATE_RUNTIME: worker
      CRATE_STREAM_TRANSCODE_MAX_CONCURRENT: ${STREAM_TRANSCODE_MAX_CONCURRENT:-1}
      CRATE_LEGACY_POOL_MAXCONN: ${PLAYBACK_LEGACY_POOL_MAXCONN:-2}
      CRATE_SQLALCHEMY_POOL_SIZE: ${PLAYBACK_SQLALCHEMY_POOL_SIZE:-1}
      CRATE_SQLALCHEMY_MAX_OVERFLOW: ${PLAYBACK_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ${CRATE_CONFIG_FILE:-./app/config.yaml}:/app/config.yaml:ro
      - ${MUSIC_DIR}:/music:ro
      - ${DATA_DIR}/crate:/data
    depends_on:
      crate-postgres:
        condition: service_healthy
      crate-redis:
        condition: service_healthy
    networks:
      - crate
    mem_limit: 1g
    mem_reservation: 384m
    cpus: "1.0"
    command:
      [
        "worker",
        "--queues",
        "playback",
        "--processes",
        "${PLAYBACK_WORKER_PROCESSES:-1}",
        "--no-service-loop",
        "--no-daemons",
        "--no-projector",
        "--no-telegram",
      ]

  crate-ui:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-ui:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-ui
    restart: unless-stopped
    depends_on:
      crate-api:
        condition: service_healthy
    ports:
      - "${CRATE_ADMIN_PORT:-8580}:80"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.admin.rule: Host(`admin.${DOMAIN:-localhost}`)
      traefik.http.routers.admin.entryPoints: ${TRAEFIK_SECURE_ENTRYPOINT:-websecure}
      traefik.http.services.admin.loadbalancer.server.port: 80
      traefik.http.routers.admin.tls: ${TRAEFIK_TLS_ENABLED:-true}
      traefik.http.routers.admin.tls.certresolver: ${TRAEFIK_CERT_RESOLVER-}

  crate-listen:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-listen:${CRATE_IMAGE_TAG:-latest}
    container_name: crate-listen
    restart: unless-stopped
    depends_on:
      crate-api:
        condition: service_healthy
    ports:
      - "${CRATE_LISTEN_PORT:-8581}:80"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.listen.rule: Host(`listen.${DOMAIN:-localhost}`)
      traefik.http.routers.listen.entryPoints: ${TRAEFIK_SECURE_ENTRYPOINT:-websecure}
      traefik.http.services.listen.loadbalancer.server.port: 80
      traefik.http.routers.listen.tls: ${TRAEFIK_TLS_ENABLED:-true}
      traefik.http.routers.listen.tls.certresolver: ${TRAEFIK_CERT_RESOLVER-}
      traefik.http.middlewares.crate-auth.forwardAuth.address: http://crate-api:8585/api/auth/verify
      traefik.http.middlewares.crate-auth.forwardAuth.trustForwardHeader: true
      traefik.http.middlewares.crate-auth.forwardAuth.authResponseHeaders: Remote-User,Remote-Name,Remote-Role
      traefik.http.middlewares.crate-auth-soft.forwardAuth.address: http://crate-api:8585/api/auth/verify-soft
      traefik.http.middlewares.crate-auth-soft.forwardAuth.trustForwardHeader: true
      traefik.http.middlewares.crate-auth-soft.forwardAuth.authResponseHeaders: Remote-User,Remote-Name,Remote-Role
