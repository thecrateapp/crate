name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "app/crate/**"
      - "app/tests/**"
      - "app/requirements*.txt"
      - ".github/workflows/test-backend.yml"
  pull_request:
    paths:
      - "app/crate/**"
      - "app/tests/**"
      - "app/requirements*.txt"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: crate
          POSTGRES_PASSWORD: crate
          POSTGRES_DB: crate_test
        options: >-
          --health-cmd "pg_isready -U crate -d crate_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          pip install pyright pytest-cov
        working-directory: app

      - name: Type check
        run: pyright
        working-directory: .

      - name: Run tests with coverage
        env:
          CRATE_POSTGRES_USER: crate
          CRATE_POSTGRES_PASSWORD: crate
          CRATE_POSTGRES_HOST: localhost
          CRATE_POSTGRES_PORT: "5432"
          CRATE_POSTGRES_DB: crate_test
          POSTGRES_SUPERUSER_USER: crate
          POSTGRES_SUPERUSER_PASSWORD: crate
          POSTGRES_SUPERUSER_DB: crate_test
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_stats_integration.py \
            --ignore=tests/test_user_stats_aggregates.py \
            --tb=short \
            -q \
            --cov=crate \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=50
        working-directory: app

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: app/coverage.xml
          flags: python
