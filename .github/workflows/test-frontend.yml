name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - "app/shared/**"
      - "app/ui/**"
      - "app/listen/**"
      - "app/listen-desktop/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test-frontend.yml"
  pull_request:
    paths:
      - "app/shared/**"
      - "app/ui/**"
      - "app/listen/**"
      - "app/listen-desktop/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test-frontend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check shared UI
        run: npm run --workspace=@crate/ui typecheck

      - name: Test shared UI (@crate/ui)
        run: npm run --workspace=@crate/ui test

      - name: Type check admin UI
        run: npm run --workspace=app/ui typecheck

      - name: Test admin UI (crate-ui)
        run: npm run --workspace=app/ui test

      - name: Type check listen app
        run: npm run --workspace=app/listen typecheck

      - name: Test listen app
        run: npm run --workspace=app/listen test
