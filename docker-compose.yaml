networks:
  crate:
    external: true

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    networks:
      - crate
    environment:
      - TZ=${TZ}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_DIR}/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ${DATA_DIR}/traefik/acme.json:/acme.json
      - ${DATA_DIR}/traefik/conf:/conf
      - ${DATA_DIR}/traefik/logs:/var/log/traefik
    labels:
      traefik.enable: true
      traefik.http.services.traefik.loadbalancer.server.port: 80
      traefik.http.routers.traefik-secure.rule: Host(`traefik.${DOMAIN}`)
      traefik.http.routers.traefik-secure.entryPoints: websecure
      traefik.http.routers.traefik-secure.service: api@internal

  tidarr:
    image: cstaelen/tidarr:latest
    container_name: tidarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      # Auth disabled — Crate handles access via Traefik middleware
      - ENABLE_BEETS=true
      - REACT_APP_TIDAL_COUNTRY_CODE=${TIDAL_COUNTRY_CODE}
    volumes:
      - ${DATA_DIR}/tidarr:/home/app/standalone/shared
      - ${MEDIA_DIR}/downloads/tidal/incomplete:/home/app/standalone/download/incomplete
      - ${MEDIA_DIR}/downloads/tidal/albums:/home/app/standalone/download/albums
      - ${MEDIA_DIR}/downloads/tidal/tracks:/home/app/standalone/download/tracks
      - ${MEDIA_DIR}/downloads/tidal/playlists:/home/app/standalone/download/playlists
      - ${MEDIA_DIR}/music:/home/app/standalone/library
      - ${MEDIA_DIR}/music:/music
      - ${MEDIA_DIR}/downloads/tidal/videos:/home/app/standalone/download/videos
    ports:
      - "${TIDARR_PORT}:8484"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.tidarr.rule: Host(`search.${DOMAIN}`)
      traefik.http.routers.tidarr.entryPoints: websecure
      traefik.http.routers.tidarr.tls: true
      traefik.http.routers.tidarr.tls.certresolver: letsencrypt
      traefik.http.routers.tidarr.middlewares: crate-auth-soft@docker
      traefik.http.services.tidarr.loadbalancer.server.port: 8484
      traefik.http.services.tidarr.loadbalancer.server.scheme: http

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR}/nginx/html:/usr/share/nginx/html:ro
      - ${DATA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR}/nginx/logs:/var/log/nginx
    ports:
      - "${NGINX_PORT}:80"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.diego-ninja.rule: Host(`diego.ninja`)
      traefik.http.routers.diego-ninja.entryPoints: websecure
      traefik.http.services.diego-ninja.loadbalancer.server.port: 80
      traefik.http.routers.diego-ninja.middlewares: diego-ninja-headers
      traefik.http.middlewares.diego-ninja-headers.headers.customRequestHeaders.X-Forwarded-Proto: https
      traefik.http.middlewares.diego-ninja-headers.headers.customResponseHeaders.X-Frame-Options: SAMEORIGIN
      traefik.http.middlewares.diego-ninja-headers.headers.customResponseHeaders.X-Content-Type-Options: nosniff
      traefik.http.middlewares.diego-ninja-headers.headers.customResponseHeaders.Referrer-Policy: strict-origin-when-cross-origin
      traefik.http.routers.diego-ninja.tls: true
      traefik.http.routers.diego-ninja.tls.certresolver: letsencrypt

  # Soulseek client via slskd
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SHARED_DIR=/data/music
      - SLSKD_DOWNLOADS_DIR=/data/downloads/soulseek
      - SLSKD_INCOMPLETE_DIR=/data/downloads/soulseek/incomplete
      - SLSKD_WEB_AUTHENTICATION_API_KEYS_SOULSYNC=${SLSKD_API_KEY}
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_SOULSEEK_LISTEN_IP=0.0.0.0
      - SLSKD_SOULSEEK_LISTEN_PORT=${SLSKD_LISTEN_PORT}
    volumes:
      - ${DATA_DIR}/slskd:/app
      - ${MEDIA_DIR}:/data
    ports:
      - "${SLSKD_PORT}:5030"
      - "${SLSKD_LISTEN_PORT}:${SLSKD_LISTEN_PORT}"
    networks:
      - crate
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.slskd.rule: Host(`soulseek.${DOMAIN}`)
      traefik.http.routers.slskd.entryPoints: websecure
      traefik.http.services.slskd.loadbalancer.server.port: 5030
      traefik.http.routers.slskd.tls: true
      traefik.http.routers.slskd.tls.certresolver: letsencrypt

  # Crate — Redis cache
  crate-redis:
    image: redis:7-alpine
    container_name: crate-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - crate_redis:/data
    networks:
      - crate

  # Crate — PostgreSQL database
  # POSTGRES_USER/PASSWORD/DB only take effect on first volume init.
  # The app connects using CRATE_POSTGRES_* vars from .env.
  # These MUST match an existing role in the volume, or the init script
  # must create one. See app/scripts/init-postgres.sh for provisioning.
  crate-postgres:
    image: pgvector/pgvector:pg15
    container_name: crate-postgres
    restart: unless-stopped
    mem_limit: 1g
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - log_line_prefix=%m [%p] %q%u@%d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER_USER:-crate}"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - POSTGRES_USER=${POSTGRES_SUPERUSER_USER:-crate}
      - POSTGRES_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-crate}
      - POSTGRES_DB=${POSTGRES_SUPERUSER_DB:-crate}
    volumes:
      - crate_postgres:/var/lib/postgresql/data
    networks:
      - crate

  # Crate — PostgreSQL backups
  crate-postgres-backup:
    image: prodrigestivill/postgres-backup-local:14-alpine
    container_name: crate-postgres-backup
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - POSTGRES_HOST=crate-postgres
      - POSTGRES_DB=${CRATE_POSTGRES_DB}
      - POSTGRES_USER=${CRATE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
    volumes:
      - ${DATA_DIR}/backups/postgres:/backups
    networks:
      - crate
    depends_on:
      - crate-postgres

  # Crate — Music stack management
  crate-api:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-api:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app
      target: api
    container_name: crate-api
    restart: unless-stopped
    user: ${PUID}:${PGID}
    group_add:
      - "${DOCKER_GID:-988}"
    environment:
      - TZ=${TZ}
      - CRATE_RUNTIME=api
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - LASTFM_APIKEY=${LASTFM_APIKEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - DOMAIN=${DOMAIN}
      - SPOTIFY_ID=${SPOTIFY_ID}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY}
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
      - POSTGRES_SUPERUSER_USER=${POSTGRES_SUPERUSER_USER:-crate}
      - POSTGRES_SUPERUSER_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-crate}
      - POSTGRES_SUPERUSER_DB=${POSTGRES_SUPERUSER_DB:-crate}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama/llama3.1:8b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crate-redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - CRATE_SSE_REDIS_MAX_CONNECTIONS=${CRATE_SSE_REDIS_MAX_CONNECTIONS:-128}
      - SLSKD_URL=http://slskd:5030
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - DISCOGS_CONSUMER_KEY=${DISCOGS_CONSUMER_KEY:-}
      - DISCOGS_CONSUMER_SECRET=${DISCOGS_CONSUMER_SECRET:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      - CRATE_MEDIA_WORKER_URL=http://crate-media-worker:8687
      - CRATE_MEDIA_WORKER_MAX_ACTIVE=${CRATE_MEDIA_WORKER_MAX_ACTIVE:-1}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ${MEDIA_DIR}/music:/music:ro
      - ${DATA_DIR}/crate:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - crate
    depends_on:
      - crate-postgres
      - crate-redis
      - crate-media-worker
    mem_limit: 768m
    mem_reservation: 256m
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8585/api/status', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: true
      traefik.docker.network: crate
      traefik.http.routers.crate-api.rule: Host(`api.${DOMAIN}`)
      traefik.http.routers.crate-api.entryPoints: websecure
      traefik.http.routers.crate-api.middlewares: crate-api-compress@docker
      traefik.http.services.crate-api.loadbalancer.server.port: 8585
      traefik.http.routers.crate-api.tls: true
      traefik.http.routers.crate-api.tls.certresolver: letsencrypt
      traefik.http.middlewares.crate-api-compress.compress: true
      traefik.http.middlewares.crate-api-compress.compress.encodings: gzip,br
      traefik.http.middlewares.crate-api-compress.compress.minResponseBodyBytes: 1024
      traefik.http.middlewares.crate-api-compress.compress.excludedContentTypes: text/event-stream,audio/mpeg,audio/flac,audio/x-flac,audio/mp4,audio/aac,audio/ogg,video/mp4,application/octet-stream,application/zip,application/x-zip-compressed,image/jpeg,image/png,image/webp,image/avif
    command: ["api"]

  crate-readplane:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-readplane:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app/readplane
    container_name: crate-readplane
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - READPLANE_ADDR=:8686
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
      - CRATE_POSTGRES_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crate-redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - READPLANE_ENABLED=${READPLANE_ENABLED:-true}
      - READPLANE_ENABLE_SSE=${READPLANE_ENABLE_SSE:-true}
      - READPLANE_ROUTE_MODE=${READPLANE_ROUTE_MODE:-shadow}
      - READPLANE_FALLBACK_ENABLED=${READPLANE_FALLBACK_ENABLED:-true}
      - API_FALLBACK_BASE=http://crate-api:8585
      - READPLANE_MAX_DB_CONNS=${READPLANE_MAX_DB_CONNS:-8}
      - READPLANE_MIN_DB_CONNS=${READPLANE_MIN_DB_CONNS:-1}
      - READPLANE_QUERY_TIMEOUT_MS=${READPLANE_QUERY_TIMEOUT_MS:-800}
      - READPLANE_SNAPSHOT_MAX_AGE_SECONDS=${READPLANE_SNAPSHOT_MAX_AGE_SECONDS:-600}
      - READPLANE_STALE_MAX_AGE_SECONDS=${READPLANE_STALE_MAX_AGE_SECONDS:-3600}
    networks:
      - crate
    depends_on:
      - crate-postgres
      - crate-redis
      - crate-api
    mem_limit: 128m
    mem_reservation: 32m
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "/crate-readplane", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  crate-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-worker:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app
      target: worker-core
    container_name: crate-worker
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - CRATE_RUNTIME=worker
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - LASTFM_APIKEY=${LASTFM_APIKEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET:-}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - DOMAIN=${DOMAIN}
      - SPOTIFY_ID=${SPOTIFY_ID}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET}
      - SETLISTFM_API_KEY=${SETLISTFM_API_KEY}
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
      - POSTGRES_SUPERUSER_USER=${POSTGRES_SUPERUSER_USER:-crate}
      - POSTGRES_SUPERUSER_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-crate}
      - POSTGRES_SUPERUSER_DB=${POSTGRES_SUPERUSER_DB:-crate}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama/llama3.1:8b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - OMP_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - MKL_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - TORCH_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - NUMBA_NUM_THREADS=${CRATE_WORKER_NATIVE_THREADS:-1}
      - CRATE_FFMPEG_THREADS=${CRATE_WORKER_FFMPEG_THREADS:-1}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crate-redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - SLSKD_URL=http://slskd:5030
      - SLSKD_API_KEY=${SLSKD_API_KEY:-}
      - DISCOGS_CONSUMER_KEY=${DISCOGS_CONSUMER_KEY:-}
      - DISCOGS_CONSUMER_SECRET=${DISCOGS_CONSUMER_SECRET:-}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY:-}
      - CRATE_RESOURCE_GOVERNOR_ENABLED=${CRATE_RESOURCE_GOVERNOR_ENABLED:-true}
      - CRATE_RESOURCE_MAX_LOAD_RATIO=${CRATE_RESOURCE_MAX_LOAD_RATIO:-0.85}
      - CRATE_RESOURCE_MAX_IOWAIT_PERCENT=${CRATE_RESOURCE_MAX_IOWAIT_PERCENT:-25}
      - CRATE_RESOURCE_MAX_SWAP_PERCENT=${CRATE_RESOURCE_MAX_SWAP_PERCENT:-30}
      - CRATE_RESOURCE_MIN_SWAP_USED_MB=${CRATE_RESOURCE_MIN_SWAP_USED_MB:-512}
      - CRATE_RESOURCE_MIN_MEMORY_AVAILABLE_PERCENT=${CRATE_RESOURCE_MIN_MEMORY_AVAILABLE_PERCENT:-15}
      - CRATE_RESOURCE_MAX_ACTIVE_USERS=${CRATE_RESOURCE_MAX_ACTIVE_USERS:-0}
      - CRATE_RESOURCE_MAX_ACTIVE_STREAMS=${CRATE_RESOURCE_MAX_ACTIVE_STREAMS:-0}
      - CRATE_RESOURCE_DEFER_SECONDS=${CRATE_RESOURCE_DEFER_SECONDS:-300}
      - CRATE_MAINTENANCE_WINDOW_ENABLED=${CRATE_MAINTENANCE_WINDOW_ENABLED:-true}
      - CRATE_MAINTENANCE_WINDOW_START=${CRATE_MAINTENANCE_WINDOW_START:-02:00}
      - CRATE_MAINTENANCE_WINDOW_END=${CRATE_MAINTENANCE_WINDOW_END:-07:00}
      - CRATE_MAINTENANCE_WINDOW_FINGERPRINT_LIMIT=${CRATE_MAINTENANCE_WINDOW_FINGERPRINT_LIMIT:-1000}
      - CRATE_LEGACY_POOL_MAXCONN=${CRATE_WORKER_LEGACY_POOL_MAXCONN:-4}
      - CRATE_SQLALCHEMY_POOL_SIZE=${CRATE_WORKER_SQLALCHEMY_POOL_SIZE:-2}
      - CRATE_SQLALCHEMY_MAX_OVERFLOW=${CRATE_WORKER_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ${MEDIA_DIR}/music:/music
      - ${MEDIA_DIR}/downloads/soulseek:/downloads/soulseek
      - ${DATA_DIR}/crate:/data
    networks:
      - crate
    depends_on:
      - crate-postgres
      - crate-redis
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: "0.75"
    command:
      [
        "worker",
        "--queues",
        "fast,default",
        "--processes",
        "${CRATE_WORKER_PROCESSES:-1}",
        "--no-daemons",
        "--no-projector",
      ]

  crate-projector:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-worker:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app
      target: worker-core
    container_name: crate-projector
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - CRATE_RUNTIME=projector
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - DOMAIN=${DOMAIN}
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
      - POSTGRES_SUPERUSER_USER=${POSTGRES_SUPERUSER_USER:-crate}
      - POSTGRES_SUPERUSER_PASSWORD=${POSTGRES_SUPERUSER_PASSWORD:-crate}
      - POSTGRES_SUPERUSER_DB=${POSTGRES_SUPERUSER_DB:-crate}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@crate-redis:6379/0
      - CRATE_METRICS_REDIS_TTL_SECONDS=${CRATE_METRICS_REDIS_TTL_SECONDS:-86400}
      - CRATE_PROJECTOR_INTERVAL_SECONDS=${CRATE_PROJECTOR_INTERVAL_SECONDS:-5}
      - CRATE_PROJECTOR_BATCH_LIMIT=${CRATE_PROJECTOR_BATCH_LIMIT:-200}
      - CRATE_LEGACY_POOL_MAXCONN=${PROJECTOR_LEGACY_POOL_MAXCONN:-2}
      - CRATE_SQLALCHEMY_POOL_SIZE=${PROJECTOR_SQLALCHEMY_POOL_SIZE:-1}
      - CRATE_SQLALCHEMY_MAX_OVERFLOW=${PROJECTOR_SQLALCHEMY_MAX_OVERFLOW:-1}
    volumes:
      - ./app/config.yaml:/app/config.yaml:ro
      - ${MEDIA_DIR}/music:/music:ro
      - ${DATA_DIR}/crate:/data
    networks:
      - crate
    depends_on:
      - crate-postgres
      - crate-redis
    mem_limit: 512m
    mem_reservation: 128m
    cpus: "0.25"
    command: ["projector"]

  crate-maintenance-worker:
    image: ${CRATE_IMAGE_REGISTRY:-ghcr.io}/${CRATE_IMAGE_OWNER:-thecrateapp}/crate-worker:${CRATE_IMAGE_TAG:-latest}
    build:
      context: ./app
      target: worker-core
    container_name: crate-maintenance-worker
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - CRATE_RUNTIME=worker
      - CRATE_CONFIG=/app/config.yaml
      - DATA_DIR=/data
      - DOMAIN=${DOMAIN}
      - CRATE_POSTGRES_USER=${CRATE_POSTGRES_USER}
      - CRATE_POSTGRES_PASSWORD=${CRATE_POSTGRES_PASSWORD}
      - CRATE_POSTGRES_DB=${CRATE_POSTGRES_DB}
      - CRATE_POSTGRES_HOST=crate-postgres
