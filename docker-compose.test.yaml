services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: crate-test-postgres
    environment:
      POSTGRES_USER: crate
      POSTGRES_PASSWORD: crate_test
      POSTGRES_DB: crate_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crate -d crate_test"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 2s

  redis:
    image: redis:7-alpine
    container_name: crate-test-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
